name: Sync Notion to Blog

on:
  # 每天凌晨 2 点自动执行
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = 北京时间 02:00

  # 手动触发
  workflow_dispatch:

  # 推送到 main 分支时触发（可选）
  push:
    branches:
      - main
    paths:
      - 'scripts/sync-notion.js'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci

      - name: 拉取最新代码
        run: git pull origin main

      - name: 同步 Notion 笔记
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/sync-notion.js

      - name: 提交更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git restore package-lock.json || true
          git add Article/note/*.md
          git add Article/public/images/notion/* || true
          if ! git diff --staged --quiet; then
            git commit -m "🔄 自动同步 Notion 笔记 $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
